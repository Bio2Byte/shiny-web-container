events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 8000;
    server_name _;

    location = /_auth_check {
      internal;
      proxy_pass http://auth-admin:8080/auth/check;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Cookie $http_cookie;
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
    }

    location @auth_signin {
      return 302 /auth/login?next=$request_uri;
    }

    location = / {
      return 302 /rlang-app/;
    }

    location = /auth {
      return 302 /auth/login;
    }

    location = /auth/check {
      return 404;
    }

    location /auth/ {
      proxy_pass http://auth-admin:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 300;
    }

    location = /admin {
      return 302 /admin/users;
    }

    location /admin/ {
      proxy_pass http://auth-admin:8080;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_read_timeout 300;
    }

    location = /rlang-app {
      return 302 /rlang-app/;
    }

    location /rlang-app/ {
      auth_request /_auth_check;
      error_page 401 = @auth_signin;
      error_page 403 = /auth/forbidden;
      proxy_pass http://r-shiny:3838/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_buffering off;
    }

    location = /python-app {
      return 302 /python-app/;
    }

    location /python-app/ {
      auth_request /_auth_check;
      error_page 401 = @auth_signin;
      error_page 403 = /auth/forbidden;
      proxy_pass http://python-shiny:3839/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_buffering off;
    }
  }
}
