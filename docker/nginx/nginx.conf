events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  server {
    listen 8000;
    server_name _;

    location = / {
      return 302 /rlang-app/;
    }

    location = /rlang-app {
      return 302 /rlang-app/;
    }

    location /rlang-app/ {
      proxy_pass http://r-shiny:3838/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_buffering off;
    }

    location = /python-app {
      return 302 /python-app/;
    }

    location /python-app/ {
      proxy_pass http://python-shiny:3839/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_buffering off;
    }
  }
}
