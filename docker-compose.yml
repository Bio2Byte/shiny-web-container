services:
  r-shiny:
    build:
      context: .
      dockerfile: docker/r-shiny/Dockerfile
    init: true
    healthcheck:
      test:
        - CMD
        - R
        - -q
        - -e
        - "con <- socketConnection('127.0.0.1', port=3838, open='r+', blocking=TRUE, timeout=2); close(con)"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    stop_grace_period: 20s
    restart: unless-stopped

  python-shiny:
    build:
      context: .
      dockerfile: docker/python-shiny/Dockerfile
    init: true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s = socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 3839)); s.close()"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    stop_grace_period: 20s
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      r-shiny:
        condition: service_healthy
      python-shiny:
        condition: service_healthy
    init: true
    ports:
      - "8000:8000"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    stop_grace_period: 10s
    restart: unless-stopped
