<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied | Shiny Auth</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(120deg, #f6f8ff 0%, #fff8f8 45%, #f7fff9 100%);
        color: #1a1e24;
      }
      .card {
        width: min(520px, 92vw);
        background: #ffffff;
        border: 1px solid #dbe1ea;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 32px rgba(20, 37, 62, 0.08);
      }
      h1 {
        margin: 0 0 10px 0;
      }
      p {
        margin: 0 0 14px 0;
        color: #4d5b71;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      a {
        text-decoration: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        display: inline-block;
      }
      .primary {
        background: #23426d;
        color: #fff;
      }
      .neutral {
        background: #e8edf6;
        color: #203457;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Access Denied</h1>
      <p>Your account is authenticated but does not have a role granting access to this Shiny application.</p>
      <p>Ask an administrator to assign the correct role in <code>/admin/roles</code> and <code>/admin/users</code>.</p>
      <div class="actions">
        <a class="primary" href="/auth/login">Back to Login</a>
        {% if session and session.is_admin %}
        <a class="neutral" href="/admin/roles">Manage Roles</a>
        {% else %}
        <a class="neutral" href="/auth/logout">Switch Account</a>
        {% endif %}
      </div>
    </main>
  </body>
</html>
