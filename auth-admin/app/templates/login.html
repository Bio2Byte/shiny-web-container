<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign In | Shiny Auth</title>
    <style>
      body {
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(120deg, #f3f7ff 0%, #f6fff7 45%, #fff9f2 100%);
        color: #1a1e24;
      }
      .card {
        width: min(420px, 90vw);
        background: #ffffff;
        border: 1px solid #dbe1ea;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 32px rgba(20, 37, 62, 0.08);
      }
      h1 {
        margin: 0 0 6px 0;
        font-size: 1.4rem;
      }
      .subtitle {
        margin: 0 0 18px 0;
        color: #536073;
      }
      .error {
        border: 1px solid #ffb9b9;
        background: #fff1f1;
        color: #8b1d1d;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input[type="text"], input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #bfc9d8;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 14px;
      }
      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font-weight: 700;
        cursor: pointer;
        background: #0f5132;
        color: #fff;
      }
      button:hover {
        background: #0c452b;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sign In</h1>
      <p class="subtitle">Authenticate to access the Shiny apps.</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/auth/login">
        <input type="hidden" name="next_path" value="{{ next_path }}">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <button type="submit">Login</button>
      </form>
    </main>
  </body>
  </html>
